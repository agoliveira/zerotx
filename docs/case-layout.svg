<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" font-family="Helvetica, Arial, sans-serif">
  <style>
    .label { font-size: 13px; fill: #444; }
    .bold  { font-size: 14px; fill: #222; font-weight: 500; }
    .small { font-size: 11px; fill: #666; }
    .frame { fill: none; stroke: #555; stroke-width: 1; }
    .display { fill: #cfe0f5; stroke: #4a7bb5; stroke-width: 0.7; }
    .status  { fill: #fae6c0; stroke: #b88a30; stroke-width: 0.7; }
    .switch  { fill: #cdebd9; stroke: #4a8a68; stroke-width: 0.7; }
    .knob    { fill: #d6cef5; stroke: #6a5dba; stroke-width: 0.7; }
    .ctrl    { fill: #f5cfc1; stroke: #b6543a; stroke-width: 0.7; }
    .gray    { fill: #ddd9ce; stroke: #6e6c66; stroke-width: 0.7; }
    .placeholder { fill: none; stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 4; }
    .hinge   { stroke: #888; stroke-width: 1; stroke-dasharray: 6 6; fill: none; }
    .hingelbl { font-size: 11px; fill: #777; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="bold">ZeroTX case layout reference</text>
  <text x="360" y="46" text-anchor="middle" class="small">Aluminum case 450 mm wide x 320 mm tall x 150 mm deep, hinged on long edge</text>

  <!-- LID frame -->
  <rect x="60" y="70" width="600" height="280" rx="6" class="frame"/>
  <text x="74" y="90" class="small">Lid (passive: displays + cabling only)</text>

  <!-- Two displays -->
  <rect class="display" x="100" y="115" width="250" height="170" rx="4"/>
  <text x="225" y="195" text-anchor="middle" class="bold">Display 1</text>
  <text x="225" y="215" text-anchor="middle" class="small">7 inch landscape, 1024 x 600</text>

  <rect class="display" x="370" y="115" width="250" height="170" rx="4"/>
  <text x="495" y="195" text-anchor="middle" class="bold">Display 2</text>
  <text x="495" y="215" text-anchor="middle" class="small">7 inch landscape, 1024 x 600</text>

  <text x="360" y="320" text-anchor="middle" class="small">empty space below displays (engraved label area or future aux instrument)</text>

  <!-- Hinge -->
  <line x1="60" y1="358" x2="660" y2="358" class="hinge"/>
  <rect x="340" y="350" width="40" height="16" rx="2" fill="#f4f3ee" stroke="#888" stroke-width="0.5"/>
  <text x="360" y="361" text-anchor="middle" class="hingelbl">cable loom</text>
  <text x="170" y="376" class="hingelbl">hinge — 4 cables only: 2x HDMI, 2x USB-C</text>

  <!-- BODY frame -->
  <rect x="60" y="385" width="600" height="400" rx="6" class="frame"/>
  <text x="74" y="404" class="small">Body (panel + Pi 400 keyboard)</text>

  <!-- Status row -->
  <rect class="status" x="90" y="420" width="170" height="44" rx="4"/>
  <text x="175" y="447" text-anchor="middle" class="label">VFD 2x20</text>

  <rect class="status" x="275" y="420" width="100" height="44" rx="4"/>
  <text x="325" y="447" text-anchor="middle" class="label">OLED</text>

  <rect class="status" x="390" y="420" width="120" height="44" rx="4"/>
  <text x="450" y="447" text-anchor="middle" class="label">Voltmeter</text>

  <rect class="placeholder" x="525" y="420" width="100" height="44" rx="4"/>
  <text x="575" y="447" text-anchor="middle" class="small">future ?</text>

  <!-- Switches: SA SB SC SD on top row, SE SF SAFETY on bottom -->
  <g>
    <rect class="switch" x="90"  y="485" width="50" height="50" rx="4"/>
    <text x="115" y="513" text-anchor="middle" class="label">SA</text>
    <rect class="switch" x="150" y="485" width="50" height="50" rx="4"/>
    <text x="175" y="513" text-anchor="middle" class="label">SB</text>
    <rect class="switch" x="210" y="485" width="50" height="50" rx="4"/>
    <text x="235" y="513" text-anchor="middle" class="label">SC</text>
    <rect class="switch" x="270" y="485" width="50" height="50" rx="4"/>
    <text x="295" y="513" text-anchor="middle" class="label">SD</text>

    <rect class="switch" x="90"  y="545" width="50" height="50" rx="4"/>
    <text x="115" y="573" text-anchor="middle" class="label">SE</text>
    <rect class="switch" x="150" y="545" width="50" height="50" rx="4"/>
    <text x="175" y="573" text-anchor="middle" class="label">SF</text>
    <rect class="switch" x="210" y="545" width="110" height="50" rx="4"/>
    <text x="265" y="573" text-anchor="middle" class="label">safety covered</text>
  </g>

  <!-- Encoders -->
  <g>
    <circle class="knob" cx="360" cy="510" r="22"/>
    <text x="360" y="513" text-anchor="middle" class="label">enc</text>
    <circle class="knob" cx="415" cy="510" r="22"/>
    <text x="415" y="513" text-anchor="middle" class="label">enc</text>
    <circle class="knob" cx="360" cy="572" r="22"/>
    <text x="360" y="575" text-anchor="middle" class="label">enc</text>
    <circle class="knob" cx="415" cy="572" r="22"/>
    <text x="415" y="575" text-anchor="middle" class="label">enc</text>
  </g>

  <!-- 6POS, key, push, e-stop -->
  <g>
    <circle class="ctrl" cx="490" cy="510" r="28"/>
    <text x="490" y="513" text-anchor="middle" class="label">6POS</text>
    <circle class="ctrl" cx="555" cy="495" r="16"/>
    <text x="555" y="498" text-anchor="middle" class="label">key</text>
    <circle class="ctrl" cx="490" cy="582" r="22"/>
    <text x="490" y="585" text-anchor="middle" class="label">push</text>
    <circle class="ctrl" cx="555" cy="568" r="22"/>
    <text x="555" y="571" text-anchor="middle" class="label">stop</text>
  </g>

  <!-- Speakers and keyboard -->
  <rect class="gray" x="90"  y="640" width="50" height="40" rx="4"/>
  <text x="115" y="664" text-anchor="middle" class="label">spk</text>
  <rect class="gray" x="580" y="640" width="50" height="40" rx="4"/>
  <text x="605" y="664" text-anchor="middle" class="label">spk</text>

  <rect class="gray" x="160" y="640" width="400" height="120" rx="6"/>
  <text x="360" y="690" text-anchor="middle" class="bold">Pi 400 keyboard</text>
  <text x="360" y="710" text-anchor="middle" class="small">286 x 122 mm, flush at front edge</text>

  <!-- Legend at bottom -->
  <g transform="translate(60, 790)">
    <rect width="14" height="10" class="display" />
    <text x="20" y="9" class="small">displays</text>
    <rect x="80" width="14" height="10" class="status"/>
    <text x="100" y="9" class="small">status surfaces</text>
    <rect x="210" width="14" height="10" class="switch"/>
    <text x="230" y="9" class="small">switches</text>
    <rect x="290" width="14" height="10" class="knob"/>
    <text x="310" y="9" class="small">encoders</text>
    <rect x="380" width="14" height="10" class="ctrl"/>
    <text x="400" y="9" class="small">controls</text>
    <rect x="460" width="14" height="10" class="gray"/>
    <text x="480" y="9" class="small">keyboard / speakers</text>
  </g>
</svg>
