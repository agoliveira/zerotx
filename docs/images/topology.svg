<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" role="img">
<title>ZeroTX topology</title>
<desc>Block diagram of the ZeroTX ground station. External ELRS TX module on a pole connects by single-wire CRSF cable into the case to the RP2040. Two LCDs in the lid driven by the Pi 400 over HDMI. Mega 2560 and ESP32 satellites driving the front-panel VFD plus GLCD and HUB75 panel respectively. USB joystick plugs in externally via USB HID.</desc>

<defs>
<marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="340" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">RF link to aircraft (ELRS)</text>
<path d="M340 28 L340 50" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" fill="none"/>

<rect x="270" y="56" width="140" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">ELRS TX module</text>
<text x="340" y="92" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">pole-mounted</text>

<path d="M340 100 L340 130 L60 130 L60 360 L210 360 L210 368" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlue)"/>
<text x="370" y="116" text-anchor="start" font-family="sans-serif" font-size="12" fill="#185FA5">single-wire CRSF, 5m</text>

<rect x="40" y="148" width="600" height="412" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="620" y="172" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">ZeroTX case</text>

<rect x="140" y="190" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="240" y="208" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">HUD LCD</text>
<text x="240" y="225" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">7", lid, HDMI</text>

<rect x="360" y="190" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="460" y="208" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Map LCD</text>
<text x="460" y="225" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">7", lid, HDMI</text>

<rect x="240" y="266" width="200" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="286" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Raspberry Pi 400</text>
<text x="340" y="304" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">zerotxd, kiosks, audio</text>
<text x="340" y="318" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Pi OS Lite</text>

<rect x="140" y="368" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="210" y="388" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">RP2040</text>
<text x="210" y="406" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">CRSF endpoint</text>

<rect x="300" y="368" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="370" y="388" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Mega 2560</text>
<text x="370" y="406" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">IO hub</text>

<rect x="460" y="368" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="530" y="388" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">ESP32</text>
<text x="530" y="406" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">HUB75 driver</text>

<rect x="300" y="464" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="370" y="484" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">VFD + GLCD</text>
<text x="370" y="502" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">front panel</text>

<rect x="460" y="464" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="530" y="484" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">HUB75 panel</text>
<text x="530" y="502" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">128x32 LED</text>

<rect x="40" y="580" width="140" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="110" y="596" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">USB joystick</text>
<text x="110" y="612" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">Thrustmaster</text>

<line x1="240" y1="234" x2="240" y2="266" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
<text x="252" y="252" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">HDMI</text>

<line x1="440" y1="234" x2="440" y2="266" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
<text x="452" y="252" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">HDMI</text>

<path d="M290 330 L290 350 L210 350 L210 368" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrowGray)" marker-start="url(#arrowGray)"/>
<line x1="370" y1="330" x2="370" y2="368" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)" marker-start="url(#arrowGray)"/>
<path d="M390 330 L390 350 L530 350 L530 368" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrowGray)" marker-start="url(#arrowGray)"/>
<text x="340" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">USB-CDC</text>

<path d="M110 580 L110 298 L240 298" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="120" y="276" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">USB HID</text>

<line x1="370" y1="424" x2="370" y2="464" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
<text x="380" y="448" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">drives</text>

<line x1="530" y1="424" x2="530" y2="464" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
<text x="540" y="448" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">drives</text>
</svg>
