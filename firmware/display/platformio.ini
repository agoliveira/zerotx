; PlatformIO config for ZeroTX HUB75 display firmware (RP2040 port).
;
; Build:
;   cd firmware/display
;   pio run
;
; Upload to RP2040-Zero:
;   pio run -t upload
;
; Monitor serial:
;   pio device monitor -b 115200

[env:rpipico]
; Maxgerhardt's RP2040 platform fork bundles Earle Philhower's
; arduino-pico core under PlatformIO. The official "raspberrypi"
; platform either targets mbed (shaky USB-CDC) or has stale board-id
; coverage; this fork is the de facto way to drive arduino-pico from
; PlatformIO and just works.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

monitor_speed = 115200
upload_speed = 921600

; Library deps. Adafruit Protomatter handles HUB75 via the RP2040 PIO
; state machines; the same Adafruit GFX surface that the ESP32
; HUB75 lib provided, so U8g2_for_Adafruit_GFX layers on top
; unchanged.
lib_deps =
    adafruit/Adafruit Protomatter@^1.6.4
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.16.1
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
