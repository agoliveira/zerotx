; PlatformIO config for ZeroTX HUB75 display firmware.
;
; Build:
;   cd firmware/display
;   pio run
;
; Upload to ESP32:
;   pio run -t upload
;
; Monitor serial:
;   pio device monitor -b 115200
;
; If your ESP32 board variant differs, adjust the [env:esp32dev]
; section. Common variants: esp32dev, esp-wrover-kit, esp32-s3-devkitc-1.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Library deps. The HUB75 library has transitive dependencies on
; Adafruit GFX (for primitives) and BusIO. Text rendering goes
; through U8g2_for_Adafruit_GFX which has its own font catalog
; and renders cleanly without the cursor positioning bugs that
; affect raw GFX setFont() on this HUB75 library.
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.10
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.16.1
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    ; Spectator AP: WebSocketsServer for the live dashboard.
    ; WiFi.h, WebServer.h come with the ESP32 Arduino core.
    links2004/WebSockets@^2.4.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
