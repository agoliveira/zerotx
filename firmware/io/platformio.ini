; ZeroTX IO board - ATmega2560 (Arduino Mega).
;
; General "operator-facing low-bandwidth IO" board. Drives the
; Noritake VFD plus trackball status LEDs, WS2813 indicators,
; LDR ambient-light sensor, buttons, and a buzzer.
;
; The firmware is structured around a Subsystem base class with a
; central registry; new peripherals plug in by adding a class and
; one line in main.cpp.

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
upload_protocol = wiring

monitor_speed = 115200
monitor_filters = direct, time

; Build options. Strict warnings; we want the compiler shouting if
; we drift from the discipline of the design.
build_flags =
    -Wall
    -Wextra
    -Werror=return-type
    -ffunction-sections
    -fdata-sections

; Library deps. The hd44780 library by duinoWitchery (Bill Perry)
; ships the Noritake CU20025ECPB pinIO subclass we use, plus the
; I2Cexp class for PCF8574-backed character LCDs.
; Adafruit NeoPixel drives the WS2813 indicator strip.
; The Arduino Servo library is bundled with the framework but
; PlatformIO's library finder still needs it listed here so the
; #include resolves.
lib_deps =
    duinowitchery/hd44780@^1.3.2
    adafruit/Adafruit NeoPixel@^1.12.0
    Servo
