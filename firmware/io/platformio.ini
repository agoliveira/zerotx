; ZeroTX IO board - ATmega2560 (Arduino Mega).
;
; Replaces the Pro Micro VFD firmware as a general "operator-facing
; low-bandwidth IO" board. Drives the existing Noritake VFD, with
; headroom for additional VFDs, trackball status LEDs, WS2813
; indicators, LDR ambient-light sensor, buttons, and a buzzer.
;
; The firmware is structured around a Subsystem base class with a
; central registry; new peripherals plug in by adding a class and
; one line in main.cpp.

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
upload_protocol = wiring

monitor_speed = 115200
monitor_filters = direct, time

; Build options. Strict warnings; we want the compiler shouting if
; we drift from the discipline of the design.
build_flags =
    -Wall
    -Wextra
    -Werror=return-type
    -ffunction-sections
    -fdata-sections

; Library deps. The hd44780 library by duinoWitchery (Bill Perry)
; ships the Noritake CU20025ECPB pinIO subclass we use. Same library
; used by the Pro Micro firmware, so behavior is identical.
lib_deps =
    duinowitchery/hd44780@^1.3.2
