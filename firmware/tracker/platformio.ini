; ZeroTX antenna tracker firmware - PlatformIO config.
;
; Target: ESP32-S3 chip (QFN56 package), 16MB flash + 8MB QSPI PSRAM
; (AP Memory APS6404 at 3.3V). On Adilson's specific modules connected
; to cartman via a QinHeng CH343 USB-UART bridge (/dev/ttyACM0).
;
; Build:
;   cd firmware/tracker
;   pio run
;
; Upload:
;   pio run -t upload
;
; Monitor (over the CH343 UART bridge port):
;   pio device monitor

[env:esp32-s3-wroom-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Memory layout: 16MB QIO flash + 8MB QSPI (quad, NOT octal) PSRAM.
;
; arduino-esp32 ships pre-built bootloader binaries selected by the
; memory_type field. Picking the wrong variant causes a panic during
; bootloader-side PSRAM initialization with PC in the second-stage
; bootloader IROM region (e.g. 0x403cdb0a). The matching memory_type
; for AP Memory APS6404 (8MB, 3.3V quad) is qio_qspi.
;
; If the modules are ever swapped to ones with octal PSRAM
; (APS6408, 1.8V) - the typical N16R8 / N16R8V WROOM-1 modules on
; the open market - this needs to change to qio_opi.
;
; No partition table override here: arduino-esp32 v2.x doesn't ship a
; default_16MB.csv; the framework's default partition table auto-sizes
; to whatever flash_size we declare. Adding an override pointing at a
; non-existent CSV causes the same bootloader panic at 0x403cdb0a.
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi

; Use the chip's UART0 for Serial output, NOT native USB-CDC.
; Reason: cartman connects to these boards via a CH343 USB-UART bridge,
; not the chip's native USB port. With ARDUINO_USB_CDC_ON_BOOT enabled,
; Arduino's Serial would route to the native USB peripheral
; (GPIO 19/20), which we're not monitoring; the bridge port would only
; show ROM bootloader output and nothing from the application.
;
; If a different module ever connects via native USB instead, re-enable
; with: -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1
build_flags =
    -DBOARD_HAS_PSRAM

monitor_speed = 115200
upload_speed = 921600

; Phase 0 has no external library dependencies: the byte pump uses
; only HardwareSerial and FreeRTOS primitives that ship with the
; arduino-esp32 core. lib_deps will grow in later phases (e.g.,
; magnetometer driver in Phase 5).
lib_deps =
