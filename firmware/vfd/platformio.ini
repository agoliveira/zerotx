; PlatformIO config for ZeroTX VFD diagnostic display firmware.
;
; Hardware:
;   - SparkFun Pro Micro 5V/16MHz (ATmega32u4, native USB)
;   - Noritake CU20025ECPB-W1J VFD (2x20 char, HD44780-compatible)
;   - 4-bit parallel wiring:
;       VFD pin 4  (RS)  -> Pro Micro D4
;       VFD pin 5  (R/W) -> GND   (write-only)
;       VFD pin 6  (E)   -> Pro Micro D5
;       VFD pin 11 (D4)  -> Pro Micro D6
;       VFD pin 12 (D5)  -> Pro Micro D7
;       VFD pin 13 (D6)  -> Pro Micro D8
;       VFD pin 14 (D7)  -> Pro Micro D9
;       VFD pin 1  (VSS) -> GND
;       VFD pin 2  (VDD) -> 5V (CCTV PSU rail)
;       VFD pin 3  (VO)  -> GND (contrast unused on VFD)
;       VFD pins 7-10 (D0-D3) -> NC (4-bit mode)
;
;   Note: D11, D12, D13 exist on the 32u4 die but are not broken
;   out on the SparkFun Pro Micro board. We pick D4-D9 because
;   they're six contiguous header pins on the left edge.
;
; Build:
;   cd firmware/vfd
;   pio run
;
; Upload (with the Pro Micro plugged into the Pi or dev workstation):
;   pio run -t upload
;
; Monitor (Pro Micro appears as /dev/ttyACM*):
;   pio device monitor -b 115200

[env:promicro16]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
monitor_speed = 115200
upload_speed = 57600

; The duinoWitchery hd44780 library has a dedicated i/o subclass
; (hd44780_NTCU20025ECPB_pinIO) for the exact Noritake module on
; ZeroTX, including correct init timing and 4-level brightness
; support. Cleaner than rolling our own with raw LiquidCrystal.
lib_deps =
    duinoWitchery/hd44780@^1.3.2
