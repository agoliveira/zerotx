# ZeroTX sound bank dictionary.
#
# Each entry maps a track name to its spoken text per language. The
# track name is what shows up in EdgeTX model files' PLAY_TRACK custom
# functions (without the .1x/.0x repeat suffix or audio extension).
# Files are generated by scripts/build-sounds.sh into:
#
#   sounds/<lang>/<name>.mp3
#
# An override at sounds/overrides/<lang>/<name>.mp3 (or .wav) wins
# over the generated file. Overrides are merged into the lang dir at
# build time; the runtime audio package sees a single flat per-language
# directory and doesn't know about overrides.
#
# After editing this file, regenerate audio with:
#
#   ./scripts/build-sounds.sh           # incremental: only missing
#   ./scripts/build-sounds.sh --force   # regenerate everything
#   ./scripts/build-sounds.sh --lang en # one language only
#   ./scripts/build-sounds.sh --track armed   # one track only
#
# This is round 1 — a representative sample to validate pipeline output.
# After confirming the generated audio sounds right, expand to the
# full ~250 EdgeTX-equivalent set.

voices:
  en: en-US-AvaNeural
  pt: pt-BR-FranciscaNeural

