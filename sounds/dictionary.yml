# ZeroTX sound bank dictionary (public).
#
# This file defines the *public* sound bank. These are the tracks anyone cloning
# ZeroTX gets out of the box. It contains:
#
#   - The default banks (en, pt) with spoken text per track
#   - The full track catalog: alarms, flight modes, building blocks,
#     sentence fragments, numbers, units
#
# Personal banks (custom voices, voice IDs, profane variants, etc.)
# live in sounds/personal.yml (gitignored). See personal.yml.example
# for the structure.
#
# Generated audio goes to sounds/<bank>/<track>.mp3. The build script
# merges this dictionary with personal.yml at runtime if present, then
# generates audio for every bank × track combination that has non-empty
# text.
#
# === Naming conventions ===
#
#   alarms          : descriptive, kebab-case (bat-low, link-lost, failsafe)
#   flight modes    : mode-* prefix (mode-acro, mode-loiter, mode-poshold, etc.)
#   sentence frags  : descriptive phrase with its grammatical role
#                     (flight-complete, you-were-up-for, traveled,
#                      peak-altitude-of)
#   numbers         : n-N (n-0, n-1, n-100, n-1000)
#   units           : u-* (u-volts, u-meters, u-kilometers)
#   words           : w-* (w-battery, w-altitude, used in stitching)
#   connectives     : c-* (c-and, c-at, c-of)
#
# === Number/unit conventions ===
#
# The narrator avoids decimals. Distances split into kilometers + meters,
# times split into minutes + seconds, etc. See sounds/README.md for the
# full conversion rules. The dictionary provides numbers (0-30 individual,
# decades to 90, hundreds to 900, thousands to 9000) and units; the daemon
# composes them at runtime via the stitcher.

# === Banks ===
# Default voices for the public banks. Override these in personal.yml
# if you want different voices without forking the dictionary.
banks:
  en:
    voice_id: "REPLACE_WITH_EN_VOICE_ID"
    model: eleven_multilingual_v2
    description: "English"
  pt:
    voice_id: "REPLACE_WITH_PT_VOICE_ID"
    model: eleven_multilingual_v2
    description: "Brazilian Portuguese"

