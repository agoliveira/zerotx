  # ============================================================
  # BUILDING BLOCKS — for stitched phrases
  # ============================================================
  # These are concatenated at runtime to form composite announcements.
  # Pirate bank intentionally has no building-block entries: stitched
  # phrases ("battery twelve point four volts") are technical and the
  # joke wouldn't land. Building blocks stay in en, pt, pt-adilson only.

  # === Numbers (sample set) ===
  n-0:    { en: "zero",         pt: "zero",         pt-adilson: "zero" }
  n-1:    { en: "one",          pt: "um",           pt-adilson: "um" }
  n-2:    { en: "two",          pt: "dois",         pt-adilson: "dois" }
  n-3:    { en: "three",        pt: "três",         pt-adilson: "três" }
  n-4:    { en: "four",         pt: "quatro",       pt-adilson: "quatro" }
  n-5:    { en: "five",         pt: "cinco",        pt-adilson: "cinco" }
  n-10:   { en: "ten",          pt: "dez",          pt-adilson: "dez" }
  n-12:   { en: "twelve",       pt: "doze",         pt-adilson: "doze" }
  n-50:   { en: "fifty",        pt: "cinquenta",    pt-adilson: "cinquenta" }
  n-100:  { en: "one hundred",  pt: "cem",          pt-adilson: "cem" }
  n-1000: { en: "one thousand", pt: "mil",          pt-adilson: "mil" }

  # === Decimal separator ===
  n-point: { en: "point", pt: "vírgula", pt-adilson: "vírgula" }

  # === Units ===
  u-volts:    { en: "volts",                pt: "volts",                  pt-adilson: "volts" }
  u-amps:     { en: "amps",                 pt: "ampères",                pt-adilson: "ampères" }
  u-meters:   { en: "meters",               pt: "metros",                 pt-adilson: "metros" }
  u-kmh:      { en: "kilometers per hour",  pt: "quilômetros por hora",   pt-adilson: "quilômetros por hora" }
  u-percent:  { en: "percent",              pt: "porcento",               pt-adilson: "porcento" }
  u-degrees:  { en: "degrees",              pt: "graus",                  pt-adilson: "graus" }
  u-mah:      { en: "milliamp hours",       pt: "miliampères-hora",       pt-adilson: "miliampères-hora" }

  # === Composite words ===
  w-battery:    { en: "battery",    pt: "bateria",     pt-adilson: "bateria" }
  w-altitude:   { en: "altitude",   pt: "altitude",    pt-adilson: "altitude" }
  w-speed:      { en: "speed",      pt: "velocidade",  pt-adilson: "velocidade" }
  w-heading:    { en: "heading",    pt: "direção",     pt-adilson: "direção" }
  w-distance:   { en: "distance",   pt: "distância",   pt-adilson: "distância" }
