  # ============================================================
  # BUILDING BLOCKS — for stitched phrases
  # ============================================================
  # These are concatenated at runtime to form composite announcements
  # like "battery twelve point four volts" or "altitude one hundred
  # meters". Stitching is robotic compared to whole-phrase pre-render
  # but covers far more ground for the same number of files.

  # === Numbers (sample set; expand later) ===
  n-0:    { en: "zero",         pt: "zero" }
  n-1:    { en: "one",          pt: "um" }
  n-2:    { en: "two",          pt: "dois" }
  n-3:    { en: "three",        pt: "três" }
  n-4:    { en: "four",         pt: "quatro" }
  n-5:    { en: "five",         pt: "cinco" }
  n-10:   { en: "ten",          pt: "dez" }
  n-12:   { en: "twelve",       pt: "doze" }
  n-50:   { en: "fifty",        pt: "cinquenta" }
  n-100:  { en: "one hundred",  pt: "cem" }
  n-1000: { en: "one thousand", pt: "mil" }

  # === Decimal separator ===
  n-point: { en: "point", pt: "vírgula" }

  # === Units ===
  u-volts:    { en: "volts",                pt: "volts" }
  u-amps:     { en: "amps",                 pt: "ampères" }
  u-meters:   { en: "meters",               pt: "metros" }
  u-kmh:      { en: "kilometers per hour",  pt: "quilômetros por hora" }
  u-percent:  { en: "percent",              pt: "porcento" }
  u-degrees:  { en: "degrees",              pt: "graus" }
  u-mah:      { en: "milliamp hours",       pt: "miliampères-hora" }

  # === Composite words ===
  w-battery:    { en: "battery",    pt: "bateria" }
  w-altitude:   { en: "altitude",   pt: "altitude" }
  w-speed:      { en: "speed",      pt: "velocidade" }
  w-heading:    { en: "heading",    pt: "direção" }
  w-distance:   { en: "distance",   pt: "distância" }
  w-satellites: { en: "satellites", pt: "satélites" }
  w-link:       { en: "link",       pt: "sinal" }

  # === Connectives for stitching ===
  c-and: { en: "and", pt: "e" }
  c-at:  { en: "at",  pt: "a" }
  c-of:  { en: "of",  pt: "de" }
