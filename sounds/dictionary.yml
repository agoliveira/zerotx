# ZeroTX sound bank dictionary.
#
# Banks are first-class. Each bank has its own voice and its own per-track
# spoken text. The daemon's -sounds-lang flag selects which bank to use at
# runtime (e.g. -sounds-lang pt selects the standard Brazilian Portuguese
# bank; -sounds-lang pt-pirate selects the joke bank).
#
# Files are generated by scripts/build-sounds.sh into:
#
#   sounds/<bank>/<name>.mp3
#
# Hand-recorded overrides at sounds/overrides/<bank>/<name>.{mp3,wav}
# win over generated audio. Overrides are merged into the bank dir at
# build time.
#
# Build commands:
#   ./scripts/build-sounds.sh                              # all banks, incremental
#   ./scripts/build-sounds.sh --force                      # regenerate all
#   ./scripts/build-sounds.sh --bank pt-pirate             # single bank
#   ./scripts/build-sounds.sh --bank pt-pirate --track armed   # single track
#
# Audio is generated via the ElevenLabs REST API. The build script needs
# ELEVENLABS_API_KEY set in the environment.

# === Banks ===
# Each bank declares the voice ID and model. voice_id is the ElevenLabs
# voice ID (long alphanumeric string from the voice's detail page).
# model is the ElevenLabs synthesis model; eleven_multilingual_v2 is
# the right default for code-switched text (Portuguese with English
# loanwords, etc.).
banks:
  en:
    voice_id: "052jzHJceQiZr7ltnY0C"        # Mia, English
    model: eleven_multilingual_v2
    description: "Professional English (Mia)"
  pt:
    voice_id: "OjcGK1RXdMD1PFj2eIuN"        # Larissa, Brazilian Portuguese
    model: eleven_multilingual_v2
    description: "Professional Brazilian Portuguese (Larissa)"
  pt-adilson:
    voice_id: "YLqj1GKwEtOT22yleILF"        # Cloned voice, normal register
    model: eleven_multilingual_v2
    description: "Adilson's voice, neutral register"
  pt-pirate:
    voice_id: "YLqj1GKwEtOT22yleILF"        # Same clone, profane text
    model: eleven_multilingual_v2
    description: "Adilson's voice, profane (joke bank)"

# === Tracks ===
# Each track has spoken text per bank. Banks for which a track has empty
# string are skipped (no file generated for that bank/track combination).
# This lets the pirate bank ship with placeholders that the operator
# fills in over time without forcing all-at-once writing.
#
# Notes for register hints (used when filling in pt-pirate):
#   [CRIT-REPEAT]   — repeats every 5s indefinitely. Keep SHORT.
#   [WARN-REPEAT]   — repeats every 30s, max 3 cycles. Moderate length OK.
#   [ONCE]          — plays once, never repeats. Maximum personality budget.
#   [FREQUENT]      — fires often during normal use. Will be heard many times
#                     in a session; keep moderate even if [ONCE].
tracks:

  # ============================================================
  # ARMING / DISARMING
  # ============================================================

  armed:                                     # [CRIT-LIKE] fires on arm — short
    en: "Armed."
    pt: "Armado."
    pt-adilson: "Armado."
    pt-pirate: ""    # FILL IN (short, single interjection works)
  disarm:                                    # [CRIT-LIKE] fires on disarm — short
    en: "Disarmed."
    pt: "Desarmado."
    pt-adilson: "Desarmado."
    pt-pirate: ""    # FILL IN (short)
  arming-blocked:                            # [WARN] arming refused
    en: "Arming blocked."
    pt: "Armar bloqueado."
    pt-adilson: "Armar bloqueado."
    pt-pirate: ""    # FILL IN

  # ============================================================
  # FAILSAFE / CRITICAL LINK
  # ============================================================

  failsafe:                                  # [CRIT-REPEAT] every 5s — VERY short
    en: "Failsafe."
    pt: "Failsafe."
    pt-adilson: "Failsafe."
    pt-pirate: ""    # FILL IN (1-3 words MAX; will be heard repeatedly)
  link-lost:                                 # [CRIT-REPEAT] every 5s — VERY short
    en: "Link lost."
    pt: "Sinal perdido."
    pt-adilson: "Sinal perdido."
    pt-pirate: ""    # FILL IN (very short)
  link-restored:                             # [ONCE] relief, plays once
    en: "Link restored."
    pt: "Sinal restaurado."
    pt-adilson: "Sinal restaurado."
    pt-pirate: ""    # FILL IN (full personality OK)
  critical:                                  # [CRIT-REPEAT] generic critical
    en: "Critical."
    pt: "Crítico."
    pt-adilson: "Crítico."
    pt-pirate: ""    # FILL IN (very short)

  # ============================================================
  # BATTERY
  # ============================================================

  bat-low:                                   # [WARN-REPEAT] battery getting low
    en: "Battery low."
    pt: "Bateria fraca."
    pt-adilson: "Bateria fraca."
    pt-pirate: ""    # FILL IN (moderate length OK)
  bat-critical:                              # [CRIT-REPEAT] battery very low
    en: "Battery critical."
    pt: "Bateria crítica."
    pt-adilson: "Bateria crítica."
    pt-pirate: ""    # FILL IN (short)
  bat-empty:                                 # [CRIT-REPEAT] land NOW
